spring:
  application:
    name: pulsebrief-backend
  datasource:
    url: ${PULSEBRIEF_DB_URL:jdbc:mysql://localhost:3307/pulsebrief?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${PULSEBRIEF_DB_USERNAME:pulsebrief}
    password: ${PULSEBRIEF_DB_PASSWORD:pulsebrief_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${PULSEBRIEF_SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.pulsebrief
  paths-to-match: /api/**

pulsebrief:
  admin:
    security:
      legacy-token-enabled: ${PULSEBRIEF_ADMIN_LEGACY_TOKEN_ENABLED:false}
      legacy-token: ${PULSEBRIEF_ADMIN_LEGACY_TOKEN:}
      session-hours: ${PULSEBRIEF_ADMIN_SESSION_HOURS:12}
      max-failed-attempts: ${PULSEBRIEF_ADMIN_MAX_FAILED_ATTEMPTS:5}
      lock-minutes: ${PULSEBRIEF_ADMIN_LOCK_MINUTES:15}
      password-max-age-days: ${PULSEBRIEF_ADMIN_PASSWORD_MAX_AGE_DAYS:90}
      session-cleanup-retention-days: ${PULSEBRIEF_ADMIN_SESSION_CLEANUP_RETENTION_DAYS:7}
      session-cleanup-enabled: ${PULSEBRIEF_ADMIN_SESSION_CLEANUP_ENABLED:true}
      session-cleanup-cron: ${PULSEBRIEF_ADMIN_SESSION_CLEANUP_CRON:0 15 3 * * *}
      bootstrap-username: ${PULSEBRIEF_ADMIN_BOOTSTRAP_USERNAME:}
      bootstrap-password: ${PULSEBRIEF_ADMIN_BOOTSTRAP_PASSWORD:}
      bootstrap-display-name: ${PULSEBRIEF_ADMIN_BOOTSTRAP_DISPLAY_NAME:PulseBrief Admin}
      bootstrap-role: ${PULSEBRIEF_ADMIN_BOOTSTRAP_ROLE:ADMIN}
  ingestion:
    enabled: ${PULSEBRIEF_INGESTION_ENABLED:false}
    scheduling:
      enabled: ${PULSEBRIEF_INGESTION_SCHEDULING_ENABLED:false}
      poll-interval-ms: ${PULSEBRIEF_INGESTION_POLL_INTERVAL_MS:30000}
    sources: []
  pdf-cache:
    enabled: ${PULSEBRIEF_PDF_CACHE_ENABLED:false}
    storage-dir: ${PULSEBRIEF_PDF_STORAGE_DIR:./data/reports}
    max-size-mb: ${PULSEBRIEF_PDF_MAX_SIZE_MB:25}
    timeout-seconds: ${PULSEBRIEF_PDF_TIMEOUT_SECONDS:15}
  ai:
    usage:
      enabled: ${PULSEBRIEF_AI_USAGE_ENABLED:true}
      daily-request-limit: ${PULSEBRIEF_AI_DAILY_REQUEST_LIMIT:200}
      daily-token-limit: ${PULSEBRIEF_AI_DAILY_TOKEN_LIMIT:200000}
      warning-percent: ${PULSEBRIEF_AI_WARNING_PERCENT:80}
      deep-seek-input-cost-per-million-usd: ${PULSEBRIEF_AI_DEEPSEEK_INPUT_COST_PER_MILLION_USD:0}
      deep-seek-output-cost-per-million-usd: ${PULSEBRIEF_AI_DEEPSEEK_OUTPUT_COST_PER_MILLION_USD:0}
    deepseek:
      enabled: ${PULSEBRIEF_DEEPSEEK_ENABLED:false}
      api-key: ${PULSEBRIEF_DEEPSEEK_API_KEY:}
      base-url: ${PULSEBRIEF_DEEPSEEK_BASE_URL:https://api.deepseek.com/chat/completions}
      model: ${PULSEBRIEF_DEEPSEEK_MODEL:deepseek-v4-flash}
      timeout-seconds: ${PULSEBRIEF_DEEPSEEK_TIMEOUT_SECONDS:30}
      max-input-characters: ${PULSEBRIEF_DEEPSEEK_MAX_INPUT_CHARACTERS:12000}
      max-output-tokens: ${PULSEBRIEF_DEEPSEEK_MAX_OUTPUT_TOKENS:1200}
      classification:
        enabled: ${PULSEBRIEF_DEEPSEEK_CLASSIFICATION_ENABLED:false}
        min-confidence: ${PULSEBRIEF_DEEPSEEK_CLASSIFICATION_MIN_CONFIDENCE:0.65}
        max-input-characters: ${PULSEBRIEF_DEEPSEEK_CLASSIFICATION_MAX_INPUT_CHARACTERS:4000}
        max-output-tokens: ${PULSEBRIEF_DEEPSEEK_CLASSIFICATION_MAX_OUTPUT_TOKENS:300}
    openai:
      enabled: ${PULSEBRIEF_OPENAI_ENABLED:false}
      api-key: ${PULSEBRIEF_OPENAI_API_KEY:}
      base-url: ${PULSEBRIEF_OPENAI_BASE_URL:https://api.openai.com/v1/responses}
      model: ${PULSEBRIEF_OPENAI_MODEL:gpt-5.6-luna}
      timeout-seconds: ${PULSEBRIEF_OPENAI_TIMEOUT_SECONDS:30}
      max-input-characters: ${PULSEBRIEF_OPENAI_MAX_INPUT_CHARACTERS:12000}
      max-output-tokens: ${PULSEBRIEF_OPENAI_MAX_OUTPUT_TOKENS:1200}
